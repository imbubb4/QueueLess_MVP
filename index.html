<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QueueLess</title>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <main class="container">

    <!-- Skeleton overlay shown while creating ticket (Netflix-like) -->
    <div id="skeletonOverlay" class="skeleton-overlay hidden" aria-hidden="true">
      <div class="skeleton-card">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-line short"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-button"></div>
      </div>
    </div>
    <div class="site-header">
      <div class="logo">Q</div>
      <div>
        <div class="site-title">QueueLess</div>
        <div class="site-subtitle">Colas virtuales fáciles y rápidas</div>
      </div>
    </div>

    <div class="card">
      <h2>Ingresa a la cola virtual</h2>

      <p class="helper">Escribe tu nombre para generar un ticket</p>

      <input
        type="text"
        id="nombre"
        placeholder="Ingresa tu nombre"
      />

      <div class="actions">
        <button id="btnEntrar">Entrar a la cola</button>
      </div>
    </div>

    <div class="site-footer">Pequeño MVP — presentado con cariño.</div>

  </main>

  <script type="module" src="js/user.js"></script>
</body>
</html>
