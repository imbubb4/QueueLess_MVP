<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Confirmar Cola</title>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="container">

    <div class="card">

      <h1>Confirmar ingreso</h1>

      <div class="ticket-info">
        <div class="info-row">
          <div>
            <div class="label">Nombre</div>
            <div id="ticketInfo" class="value">-</div>
          </div>
        </div>

        <div class="info-row">
          <div class="label">Tiempo estimado</div>
          <div id="tiempoInfo" class="value">-</div>
        </div>
      </div>

      <div class="actions">
        <button id="btnAceptar">Entrar a la cola y mostrar Ticket</button>
        <button id="btnCancelar" class="secondary">Vuelvo otro día</button>
      </div>

    </div>

  </main>

  <script type="module" src="js/confirm.js"></script>

</body>
</html>
